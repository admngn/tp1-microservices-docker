server {
  listen 80 default_server;
  listen [::]:80 default_server;
  root /var/www;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }

  location = /health {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /metrics {
    access_log off;
    default_type text/plain;
    return 200 "# HELP app_up Service is up\n# TYPE app_up gauge\napp_up 1\n";
  }
}
