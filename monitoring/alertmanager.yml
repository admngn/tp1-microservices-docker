global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'console-log'

  routes:
    - match:
        severity: critical
      receiver: 'console-log'
      group_wait: 10s

receivers:
  - name: 'console-log'
    webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true

inhibit_rules:
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'HighErrorRate|HighLatencyP99'
    equal: ['job']
